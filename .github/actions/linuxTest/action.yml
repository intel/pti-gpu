name: 'Linux tests for PTI'
description: |
  Run the tests with a partition that is expected to ALWAYS succeed and
  another partition that MAY fail. The latter is designated as Quarantine.
inputs:
  wdir:
    description: Working directory
    required: true
  preset:
    description: Preset used in the build to be tested.
    required: true

runs:
  using: "composite"
  steps:

    - name: Tests that MUST succeed.
      working-directory: ${{ inputs.wdir }}
      shell: bash
      run: |
        source /opt/intel/oneapi/setvars.sh

        # TODO(PTI-353)
        ctest --output-on-failure --preset ${{ inputs.preset }} -LE performance -E "MetricsMultiThreadingTest.ConcurrentStartCollectionDifferentDevices|MetricsMultiThreadingTest.ConcurrentCollectionManagement"

    - name: Quarantined tests # flaky tests
      continue-on-error: true
      working-directory: ${{ inputs.wdir }}
      shell: bash
      run: |
        source /opt/intel/oneapi/setvars.sh

        if ctest --output-on-failure --preset ${{ inputs.preset }} -L performance; then
          echo "Test status: 0"
          echo "Performance tests pass"
        else
          echo "Test status: 1"
          echo "::warning::Performance tests failed"
        fi

        # TODO(PTI-353)
        if ctest --output-on-failure --preset ${{ inputs.preset }} -R "MetricsMultiThreadingTest.ConcurrentStartCollectionDifferentDevices|MetricsMultiThreadingTest.ConcurrentCollectionManagement"; then
          echo "Test status: 0"
          echo "Quarantined tests pass"
        else
          echo "Test status: 1"
          echo "::warning::Quarantined tests failed"
        fi
        exit 0
