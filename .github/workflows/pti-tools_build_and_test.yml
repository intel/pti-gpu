name: pti-tools-build-and-test

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    paths-ignore:
      - sdk/**
      - .github/**
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - sdk/**
      - .github/**

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:

  pti-tools-build-and-test:
    name: Test PTI Tools ${{ matrix.os_id }} ${{ matrix.tags }}

    timeout-minutes: 20

    if: vars.PTI_RUN_TESTS == 1

    runs-on: ${{ fromJSON(matrix.tags) }}

    strategy:
      matrix:
        include:
          #
          # Must fix PTI_DOCKER_UBUNTU_24_4_ONEAPI_N, for now
          # point it to N-1
          #
          - container: ${{ vars.PTI_DOCKER_UBUNTU_24_4_ONEAPI_NMINUS1 }}
            tags: '["self-hosted", "Linux", "pti", "PVC"]'
            os_id: "ubuntu-22.04.2025.1.0"
          - container: ${{ vars.PTI_DOCKER_UBUNTU_24_4_ONEAPI_NMINUS1 }}
            tags: '["self-hosted", "Linux", "pti", "BMG"]'
            os_id: "ubuntu-22.04.2025.1.0"

    container:
      image: ${{ matrix.container }}
      options: --device=/dev/dri --cap-add CAP_PERFMON

    steps:
      - name: Clean-up
        run:  rm -rf *

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build-unitrace
        working-directory: tools/unitrace
        run: |
          source /opt/intel/oneapi/setvars.sh
          mkdir build
          cd build
          cmake -DBUILD_WITH_MPI=0 -GNinja ..
          ninja

      - name: Test-unitrace
        working-directory: tools/unitrace/test
        run: |
          source /opt/intel/oneapi/setvars.sh
          python ./test_unitrace.py

      - name: Build-and-test-onetrace
        run: |
          source /opt/intel/oneapi/setvars.sh
          python ./tests/run.py -s onetrace

      # TODO: Fix tools on platforms later than PVC.
      - name: Build-and-test-oneprof
        if: contains(fromJSON(matrix.tags), 'PVC')
        run: |
          source /opt/intel/oneapi/setvars.sh
          python ./tests/run.py -s oneprof

      - name: Build-and-test-sysmon
        if: contains(fromJSON(matrix.tags), 'PVC')
        run: |
          source /opt/intel/oneapi/setvars.sh
          python ./tests/run.py -s sysmon

      - name: Build-and-test-cl_gpu_metrics
        if: contains(fromJSON(matrix.tags), 'PVC')
        run: |
          source /opt/intel/oneapi/setvars.sh
          python ./tests/run.py -s cl_gpu_metrics

      - name: Build-and-test-instcount
        if: contains(fromJSON(matrix.tags), 'PVC')
        run: |
          source /opt/intel/oneapi/setvars.sh
          python ./tests/run.py -s instcount

      - name: Build-and-test-ze_debug_info
        if: contains(fromJSON(matrix.tags), 'PVC')
        run: |
          source /opt/intel/oneapi/setvars.sh
          python ./tests/run.py -s ze_debug_info

      - name: Build-and-test-cl_debug_info
        if: contains(fromJSON(matrix.tags), 'PVC')
        run: |
          source /opt/intel/oneapi/setvars.sh
          python ./tests/run.py -s cl_debug_info

  pti-tools-build-and-test-windows:

    name: Test unitrace on Windows

    timeout-minutes: 20

    if: vars.PTI_RUN_TESTS == 1

    runs-on: [self-hosted, Windows, pti, ARC]

    defaults:
      run:
        shell: cmd

    steps:
      - name: Clean-up
        run: |
          del /S /Q /F *

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build-unitrace
        working-directory: tools/unitrace
        run: |
          @echo off
          call "C:\Program Files (x86)\Intel\oneAPI\setvars.bat"
          mkdir build
          cd build
          cmake -DBUILD_WITH_MPI=0 -GNinja ..
          ninja

      - name: Test-unitrace
        working-directory: tools/unitrace/test
        env:
          SYCL_UR_USE_LEVEL_ZERO_V2: 0
        run: |
          @echo off
          call "C:\Program Files (x86)\Intel\oneAPI\setvars.bat"
          python ./test_unitrace.py

      - name: Print output files on failure
        if: failure()
        run: |
          @echo off
          setlocal enabledelayedexpansion

          set "ROOT=tools\unitrace\test\build\Testing"

          if not exist "%ROOT%" (
            echo [WARN] Testing folder not found: "%ROOT%"
            goto :eof
          )

          echo.
          echo ===== Enumerating LastTest.log under "%ROOT%" =====

          rem Loop over test subdirectories
          for /d %%D in ("%ROOT%\*") do (
            set "TESTDIR=%%~fD"
            set "LOGFILE=%%~fD\LastTest.log"
            echo.
            echo ---------- [Test: %%~nxD] ----------
            if exist "!LOGFILE!" (
              echo [INFO] Found: "!LOGFILE!"
              type "!LOGFILE!"
            ) else (
              echo [WARN] No LastTest.log in "%%~fD"
              rem Optionally list directory contents to help debug
              dir /b "%%~fD"
            )
          )

          echo.
          echo ===== Done printing LastTest.log files =====

          rem Print output files from results directory
          set "RESULTS=tools\unitrace\test\build\results"
          
          if not exist "%RESULTS%" (
            echo [WARN] Results folder not found: "%RESULTS%"
            goto :eof
          )

          echo.
          echo ===== Enumerating output files under "%RESULTS%" =====

          for %%F in ("%RESULTS%\*.txt") do (
            echo.
            echo ---------- [Output File: %%~nxF] ----------
            echo [INFO] Found: "%%~fF"
            type "%%~fF"
          )

          echo.
          echo ===== Done printing output files =====
